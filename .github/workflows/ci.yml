name: CI

# Runs the offline test suite on every push and PR. Live tests (marked `live`,
# they hit the real TradingView endpoint) are skipped in CI on purpose so the
# build stays deterministic and network-free.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Python tests (offline)
        run: python -m pytest tests/ -q -m "not live"

      - name: Frontend logic tests
        run: node --test frontend/js/store.test.mjs frontend/js/openin.test.mjs
