name: Deploy showcase to GitHub Pages

# Publishes the static showcase/ site. After the first run, set the repo's
# Pages source to "GitHub Actions" (Settings > Pages) and it goes live at
# https://mphinance.github.io/screener/

on:
  push:
    branches: [master]
    paths: ['showcase/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./showcase
      - id: deployment
        uses: actions/deploy-pages@v4
